{% include base_path %}

<div class="masthead">
  <div class="masthead__inner-wrap">
    <div class="masthead__menu">
      <nav id="site-nav" class="greedy-nav">
        <button><div class="navicon"></div></button>
        <ul class="visible-links">
          <li class="masthead__menu-item masthead__menu-item--lg persist"><a href="{{ base_path }}/" aria-label="Home"><i class="fa-solid fa-house"></i></a></li>
          {% for link in site.data.navigation.main %}
            {% if link.url contains 'http' %}
              {% assign domain = '' %}
            {% else %}
              {% assign domain = base_path %}
            {% endif %}
            <li class="masthead__menu-item"><a href="{{ domain }}{{ link.url }}">{{ link.title }}</a></li>
          {% endfor %}
          <li id="theme-toggle" class="masthead__menu-item persist tail">
            <a><i id="theme-icon" class="fa-solid fa-sun" aria-hidden="true" title="toggle theme"></i></a>
          </li>
        </ul>
        <ul class="hidden-links hidden"></ul>
      </nav>
    </div>
  </div>
</div>

<script>
/* Move all non-persist nav items into hidden-links on mobile.
   Runs inline before greedy-nav JS so items are in the right place from the start. */
(function () {
  if (window.innerWidth >= 925) return;
  var vlinks = document.querySelector('#site-nav .visible-links');
  var hlinks = document.querySelector('#site-nav .hidden-links');
  var btn    = document.querySelector('#site-nav button');
  if (!vlinks || !hlinks) return;

  /* move non-persist items to dropdown */
  var items = vlinks.querySelectorAll('li:not(.persist)');
  items.forEach(function (li) {
    hlinks.appendChild(li);
  });

  /* force hamburger visible */
  if (btn) {
    btn.classList.remove('hidden');
    btn.style.cssText = 'display:block!important;visibility:visible!important;';
  }

  /* fix visible-links layout: collapse table into flex so icons sit together */
  vlinks.style.cssText = 'display:flex!important;align-items:center!important;';
  var liItems = vlinks.querySelectorAll('li');
  liItems.forEach(function (li) {
    li.style.cssText = 'display:flex!important;align-items:center!important;';
  });
})();
</script>
